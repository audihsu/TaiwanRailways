function findScheduledJourney(originId,destinationId){

 for(let round=1;round<=required;round++){
  let next=new Map;
  for(const labels of current.values())for(const label of labels)for(const [to,options] of idx.get(label.at)||[])for(const o of connectedScheduleOptions(options,label.arrAbs==null?null:label.arrAbs+300)){
   if(hops.get(to)!==required-round)continue;
   if(label.visited.has(to))continue;
   let n={at:to,rides:[...label.rides,o],visited:new Set(label.visited),startAbs:label.startAbs??o.depAbs,arrAbs:o.arrAbs};n.visited.add(to);

   let exact=lineHint==='AFR_MAIN'?ALISHAN_LINE_ID:lineHint==='AFR_ZHAOPING'?ALISHAN_ZHAOPING:lineHint==='AFR_SHENMU'?ALISHAN_SHENMU:ALISHAN_ZHUSHAN;

 el.innerHTML=`<div class="metrics"><div class="metric"><b>NT${p.fare}</b><small>${scheduleText('selectedFare')}</small></div><div class="metric"><b>${formatDuration(p.time)}</b><small>${scheduleText(p.timeIsPartial?'knownRideTime':'scheduledTime')}</small></div><div class="metric"><b>${p.transfers}</b><small>${t('transfers')}</small></div></div>${statusHtml}${trainHtml}<div class="result-subtitle">${scheduleText('routeDetail')}・${p.distance.toFixed(1)} ${t('km')}</div><div class="steps">${stepHtml}</div>`
}
function walkEstimate(a,b){if(!a||!b)return null;let km;if(a.lat!=null&&b.lat!=null){let R=6371,dlat=(b.lat-a.lat)*Math.PI/180,dlon=(b.lon-a.lon)*Math.PI/180,aa=Math.sin(dlat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dlon/2)**2;km=2*R*Math.asin(Math.sqrt(aa))}else km=Math.hypot(a.x-b.x,a.y-b.y)*CFG.kmPerUnit;km*=1.35;if(km>6)return null;return{km,minutes:Math.ceil(km*1000/75+3)}}

function mapSafeArea(){let sidebar=$('#sidebar').getBoundingClientRect();return innerWidth>700?{left:Math.ceil(sidebar.right+14),right:20,top:14,bottom:56}:{left:10,right:58,top:58,bottom:Math.min(innerHeight*.4,270)}}
function fitNetwork(centerId=CFG.defaultCenter){let vp=$('#viewport').getBoundingClientRect(),W=CFG.canvas[0],H=CFG.canvas[1],safe=mapSafeArea(),availW=Math.max(120,vp.width-safe.left-safe.right),availH=Math.max(120,vp.height-safe.top-safe.bottom);scale=Math.max(minScale,Math.min(1.15,availW/(W*1.05),availH/(H*1.05)));let s=stationMap.get(centerId)||CFG.stations[0],worldX=W/2+s.x,worldY=H/2+s.y,targetX=safe.left+(availW/2),targetY=safe.top+availH/2;tx=targetX-worldX*scale;ty=targetY-worldY*scale;renderAll()}
function applyTransform(){$('#world').style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function scheduleZoomRender(){if(zoomRenderFrame)return;zoomRenderFrame=requestAnimationFrame(()=>{zoomRenderFrame=0;renderAll()})}
function zoomAt(f,cx=innerWidth/2,cy=innerHeight/2){let ns=Math.max(minScale,Math.min(maxScale,scale*f));tx=cx-(cx-tx)*ns/scale;ty=cy-(cy-ty)*ns/scale;scale=ns;applyTransform();scheduleZoomRender()}

$('#zoomIn').onclick=()=>zoomAt(1.25);$('#zoomOut').onclick=()=>zoomAt(.8);$('#clearSearch').onclick=()=>{searchHitId='';$('#search').value='';renderAll()};$('#search').oninput=e=>{let q=e.target.value.trim().toLowerCase();if(!q){searchHitId='';return renderAll()}let s=CFG.stations.find(s=>(stationCode(s)+' '+Object.values(s.lineCodes||{}).join(' ')+' '+Object.values(s.name).join(' ')).toLowerCase().includes(q));if(s){searchHitId=s.id;focusStation(s.id)}};
function focusStation(id){let s=stationMap.get(id),W=CFG.canvas[0],H=CFG.canvas[1],safe=mapSafeArea(),centerX=safe.left+(innerWidth-safe.left-safe.right)/2,centerY=safe.top+(innerHeight-safe.top-safe.bottom)/2;scale=Math.max(scale,.9);tx=centerX-(W/2+s.x)*scale;ty=centerY-(H/2+s.y)*scale;applyTransform();renderAll()}

document.addEventListener('click',e=>{if(!e.target.closest('#topControls'))$('#moreMenu').hidden=true;if(!e.target.closest('#displayPanel')&&!e.target.closest('#displayBtn')){$('#displayPanel').hidden=true;$('#displayBtn').setAttribute('aria-expanded','false')}if(!e.target.closest('.corner'))$$('.corner').forEach(x=>x.classList.remove('open'))});document.addEventListener('keydown',e=>{if(e.key==='Escape'){if($('#modal').classList.contains('open'))$('#modal').classList.remove('open');else if(!$('#displayPanel').hidden){$('#displayPanel').hidden=true;$('#displayBtn').setAttribute('aria-expanded','false')}else if(!$('#moreMenu').hidden)$('#moreMenu').hidden=true;else $$('.corner').forEach(x=>x.classList.remove('open'))}});
const vp=$('#viewport');vp.addEventListener('pointerdown',e=>{if(e.pointerType==='touch')return;if(e.target.closest('.station'))return;drag={x:e.clientX,y:e.clientY,tx,ty,id:e.pointerId};vp.setPointerCapture(e.pointerId);$('#world').classList.add('dragging')});vp.addEventListener('pointermove',e=>{if(!drag||drag.id!==e.pointerId)return;tx=drag.tx+e.clientX-drag.x;ty=drag.ty+e.clientY-drag.y;applyTransform()});vp.addEventListener('pointerup',e=>{drag=null;$('#world').classList.remove('dragging')});vp.addEventListener('pointercancel',()=>{drag=null;$('#world').classList.remove('dragging')});vp.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.deltaY<0?1.12:.89,e.clientX,e.clientY)},{passive:false});
let touches=new Map();vp.addEventListener('touchstart',e=>{for(const x of e.changedTouches)touches.set(x.identifier,[x.clientX,x.clientY]);if(touches.size===2){let a=[...touches.values()],dx=a[1][0]-a[0][0],dy=a[1][1]-a[0][1];pinch={dist:Math.hypot(dx,dy),scale,tx,ty,cx:(a[0][0]+a[1][0])/2,cy:(a[0][1]+a[1][1])/2};e.preventDefault()}},{passive:false});vp.addEventListener('touchmove',e=>{for(const x of e.changedTouches)touches.set(x.identifier,[x.clientX,x.clientY]);if(pinch&&touches.size===2){let a=[...touches.values()],cx=(a[0][0]+a[1][0])/2,cy=(a[0][1]+a[1][1])/2,d=Math.hypot(a[1][0]-a[0][0],a[1][1]-a[0][1]),ns=Math.max(minScale,Math.min(maxScale,pinch.scale*d/pinch.dist));tx=cx-(pinch.cx-pinch.tx)*ns/pinch.scale;ty=cy-(pinch.cy-pinch.ty)*ns/pinch.scale;scale=ns;applyTransform();e.preventDefault()}},{passive:false});vp.addEventListener('touchend',e=>{for(const x of e.changedTouches)touches.delete(x.identifier);if(touches.size<2){pinch=null;renderAll()}});vp.addEventListener('touchcancel',e=>{for(const x of e.changedTouches)touches.delete(x.identifier);if(touches.size<2){pinch=null;renderAll()}});
